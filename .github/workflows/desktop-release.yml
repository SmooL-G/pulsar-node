name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-24.04
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'desktop/src-tauri'

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Tauri CLI + generate icons
        working-directory: desktop
        shell: bash
        run: |
          npm install --no-audit --no-fund
          npx @tauri-apps/cli icon ./src-tauri/icons/source.png

      - name: Prepare signing key
        id: prep_signing
        working-directory: desktop
        shell: bash
        env:
          KEY_VALUE: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${KEY_VALUE}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is not set — building without updater signatures."
            # Drop createUpdaterArtifacts so the unsigned build doesn't fail.
            jq 'del(.bundle.createUpdaterArtifacts)' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.new
            mv src-tauri/tauri.conf.json.new src-tauri/tauri.conf.json
            echo "createUpdaterArtifacts removed."
          else
            # Tauri's bundler base64-decodes the env value as-is. The key
            # content must be EXACTLY the base64 line — no comment header,
            # no trailing newline, no CRLF.
            KEY=$(printf '%s' "${KEY_VALUE}" \
              | tr -d '\r' \
              | grep -E '^[A-Za-z0-9+/=]+$' \
              | awk '{ print length, $0 }' \
              | sort -rn \
              | head -n1 \
              | cut -d' ' -f2-)
            printf '%s' "$KEY" > "${RUNNER_TEMP}/signing.key"
            echo "key_path=${RUNNER_TEMP}/signing.key" >> "$GITHUB_OUTPUT"
            echo "extracted key length: $(wc -c < ${RUNNER_TEMP}/signing.key) (no trailing newline)"
          fi

      - name: Build Tauri app
        working-directory: desktop
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.prep_signing.outputs.key_path }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npx @tauri-apps/cli build

      - name: Collect built artifacts (debug)
        if: always()
        shell: bash
        run: |
          ls -R desktop/src-tauri/target/release/bundle 2>/dev/null || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Pulsar Desktop ${{ github.ref_name }}'
          body: |
            Pulsar Desktop relay node — ${{ github.ref_name }}

            **Install (Windows):** download the `.exe` (NSIS installer) or `.msi` and run.

            **Install (Linux):** download the `.deb` and `sudo dpkg -i pulsar-desktop_*_amd64.deb`.

            Already running an older Pulsar Desktop? Use **Check for updates** in the app — no need to redownload.

            See the [README](https://github.com/SmooL-G/pulsar-node/blob/main/desktop/README.md) for setup.
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/msi/*.msi.sig
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/deb/*.deb.sig
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          fail_on_unmatched_files: false

  publish-manifest:
    name: Publish updater manifest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets and emit latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Strip "desktop-v" prefix → semantic version for the manifest.
          VERSION="${TAG#desktop-v}"
          REPO='SmooL-G/pulsar-node'
          API="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"

          mkdir -p out
          # Fetch release JSON, derive download URLs.
          curl -sSL -H "Authorization: Bearer ${GH_TOKEN}" -H 'Accept: application/vnd.github+json' "$API" > out/release.json

          # Helper: print the browser_download_url whose name matches the supplied glob.
          asset_url() {
            local pattern="$1"
            jq -r --arg p "$pattern" '
              .assets[] | select(.name | test($p)) | .browser_download_url
            ' out/release.json | head -n1
          }

          # Helper: download a .sig asset and print its content (Tauri stores the signature inside).
          asset_sig() {
            local pattern="$1"
            local url
            url="$(asset_url "$pattern")"
            if [ -z "$url" ]; then
              echo ''
              return
            fi
            curl -sSL -H "Authorization: Bearer ${GH_TOKEN}" "$url"
          }

          WIN_NSIS_URL="$(asset_url '\\.exe$')"
          WIN_NSIS_SIG="$(asset_sig '\\.exe\\.sig$')"
          LIN_DEB_URL="$(asset_url '\\.deb$')"
          LIN_DEB_SIG="$(asset_sig '\\.deb\\.sig$')"
          LIN_APP_URL="$(asset_url '\\.AppImage$')"
          LIN_APP_SIG="$(asset_sig '\\.AppImage\\.sig$')"

          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Build platforms object dynamically (only include platforms we have assets+sigs for).
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg win_url "$WIN_NSIS_URL" \
            --arg win_sig "$WIN_NSIS_SIG" \
            --arg deb_url "$LIN_DEB_URL" \
            --arg deb_sig "$LIN_DEB_SIG" \
            --arg app_url "$LIN_APP_URL" \
            --arg app_sig "$LIN_APP_SIG" \
            '{
              version: $version,
              notes: ("Pulsar Desktop " + $version),
              pub_date: $pub_date,
              platforms: (
                {}
                + (if ($win_url|length) > 0 and ($win_sig|length) > 0
                    then {"windows-x86_64": {url: $win_url, signature: $win_sig}}
                    else {} end)
                + (if ($deb_url|length) > 0 and ($deb_sig|length) > 0
                    then {"linux-x86_64": {url: $deb_url, signature: $deb_sig}}
                    else (if ($app_url|length) > 0 and ($app_sig|length) > 0
                            then {"linux-x86_64": {url: $app_url, signature: $app_sig}}
                            else {} end) end)
              )
            }' > out/latest.json

          echo '--- latest.json ---'
          cat out/latest.json

      - name: Attach latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: out/latest.json
          fail_on_unmatched_files: true
