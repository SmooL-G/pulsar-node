name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'desktop/src-tauri'

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev

      - name: Install Tauri CLI + generate icons
        working-directory: desktop
        shell: bash
        run: |
          npm install --no-audit --no-fund
          npx @tauri-apps/cli icon ./src-tauri/icons/source.png

      - name: Build Tauri app
        working-directory: desktop
        shell: bash
        run: npx @tauri-apps/cli build

      - name: Collect built artifacts (debug)
        if: always()
        shell: bash
        run: |
          ls -R desktop/src-tauri/target/release/bundle 2>/dev/null || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Pulsar Desktop ${{ github.ref_name }}'
          body: |
            Pulsar Desktop relay node — ${{ github.ref_name }}

            **Install (Windows):** download the `.exe` (NSIS installer) or `.msi` and run.

            **Install (Linux):** download the `.deb` and `sudo dpkg -i pulsar-desktop_*_amd64.deb`.

            See the [README](https://github.com/SmooL-G/pulsar-node/blob/main/desktop/README.md) for setup.
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false
